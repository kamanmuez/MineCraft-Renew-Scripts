name: Back4App Auto Redeploy

on:
  # schedule:
  #   # 每6小时运行一次
  #   - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: dual
          mode: client
      
      - name: Install dependencies
        working-directory: scripts/Back4app
        run: pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      
      - name: Run redeploy script
        working-directory: scripts/Back4app
        env:
          # GitHub Secrets
          EMAIL: ${{ secrets.BACK4APP_EMAIL }}
          PASSWORD: ${{ secrets.BACK4APP_PASSWORD }}
          APP_ID: ${{ secrets.BACK4APP_APP_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: xvfb-run python main.py
