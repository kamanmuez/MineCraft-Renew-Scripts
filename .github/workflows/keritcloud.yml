name: KeritCloud Auto Renew

on:
  schedule:
    # 每天 UTC 时间 4:00 运行（北京时间 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/KeritCloud-Auto-Renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Gost Proxy
        env:
          SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
        run: |
          if [ -z "$SOCKS_PROXY_URL" ]; then
            echo "⚠️ 未配置 SOCKS 代理，跳过代理设置"
            exit 0
          fi
          
          echo "配置的代理: ${SOCKS_PROXY_URL%%:*}://***"
          
          # 下载并安装 Gost
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost
          sudo chmod +x /usr/local/bin/gost
          echo "✅ Gost 安装完成"
          
          # 启动 Gost
          nohup gost -L=:1080 -F="$SOCKS_PROXY_URL" > gost.log 2>&1 &
          sleep 5
          echo "✅ Gost 已启动"
          
          # 验证进程
          if pgrep -x "gost" > /dev/null; then
            echo "✅ Gost 进程运行正常"
          else
            echo "❌ Gost 进程未运行"
            exit 1
          fi
      
      - name: Install dependencies
        working-directory: scripts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run renew script
        working-directory: scripts
        env:
          # GitHub Secrets
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SOCKS_PROXY_URL: ${{ secrets.SOCKS_PROXY_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 固定配置
          PROXY_SERVER: socks5://127.0.0.1:1080
        run: python main.py
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renewal-screenshots
          path: scripts/*.png
          retention-days: 30
          if-no-files-found: ignore
